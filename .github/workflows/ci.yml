name: CI

# Run the test suite on every push and PR. cus.py is a single-file tool with
# PEP 723 inline deps (click, pyyaml); tests are plain pytest under tests/ and
# each file is also runnable standalone (python3 tests/test_foo.py).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        # Runtime deps (click, pyyaml) + pytest. Deliberately NOT installed
        # from a requirements file — cus.py declares its runtime deps via PEP
        # 723 inline metadata; pytest is dev-only and never a runtime dep.
        run: python -m pip install --upgrade pip click pyyaml pytest
      - name: Syntax check
        run: python -c "import ast; ast.parse(open('cus.py').read())"
      - name: CLI imports cleanly
        run: python cus.py --help > /dev/null
      - name: Run tests
        run: python -m pytest tests/ -q
